services:
  - type: web
    name: mailpolish-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: HF_HOME
        value: /opt/render/.cache/huggingface
    disk:
      name: hf-model-cache
      mountPath: /opt/render/.cache/huggingface
      sizeGB: 2
